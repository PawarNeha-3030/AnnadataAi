<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AnnadataAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: #f0faf5; color: #2d3436; }
        .container { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo { display:flex; align-items:center; gap:10px; margin-bottom: 24px; font-weight:700; color:#00b894; text-decoration:none; }
        .logo i { color:#00b894; }
        h1 { margin: 0 0 20px; font-size: 1.8rem; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 8px; margin-bottom: 12px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #00b894; color: white; font-size: 1rem; cursor: pointer; font-weight: 600; }
        button:hover { background: #00a085; }
        .link { margin-top: 14px; font-size: 0.9rem; }
        .link a { color: #0984e3; text-decoration: none; }
        .alert { margin: 12px 0; padding: 10px; border-radius: 8px; }
        .alert-success { background: #e6ffef; color: #2d7a4f; }
        .alert-danger { background: #ffe8e8; color: #a80000; }
    </style>
</head>
<body>
    <div class="container">
        <a class="logo" href="/">
            <i class="fas fa-seedling"></i>
            <span>AnnadataAI</span>
        </a>
        <h1>Sign Up</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/signup" method="POST">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Choose username" required>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter password" required>
            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p class="link">Already have an account? <a href="/login">Login</a></p>
    </div>
</body>
</html>
